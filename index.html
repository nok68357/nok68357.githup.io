<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppRak</title>
  
  <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/nok68357/image/LogoRakServices.png">

  <style>
    .responsive-iframe {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <div> 
    <iframe id="myframe" class="responsive-iframe" src="" allowFullScreen></iframe>
  </div>
  <script>
    const apps = new URL(window.location);
    const formUrl = apps.searchParams.get('apps');
    // เพิ่ม if (formUrl) เพื่อป้องกัน Error ในกรณีที่ไม่มีการส่งพารามิเตอร์ ?apps= มา
    if (formUrl) {
      const url = decodeURIComponent(formUrl);
      document.getElementById('myframe').src = url;
    }
  </script>
</body>
</html>
