<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppRak</title>
  
  <link rel="icon" type="image/png" href="https://nok68357.github.io/nok68357.githup.io/ชื่อไฟล์รูปของคุณ.png">

  <style>
    .responsive-iframe {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <div> 
    <iframe id="myframe" class="responsive-iframe" src="" allowFullScreen></iframe>
  </div>
  <script>
    const apps = new URL(window.location);
    const formUrl = apps.searchParams.get('apps');
    
    // ป้องกัน Error โดยเช็กว่า formUrl มีค่าและไม่ว่างเปล่า
    if (formUrl && formUrl.trim() !== '') {
      const url = decodeURIComponent(formUrl);
      document.getElementById('myframe').src = url;
    }
  </script>
</body>
</html>
